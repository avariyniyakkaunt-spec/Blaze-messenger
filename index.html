<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blaze Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; text-align: center; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #ff00ff; padding: 10px; margin: 10px 0; background: #0d0d0d; }
        .msg-own { text-align: right; color: #00ffff; margin: 5px; }
        .msg-other { text-align: left; color: #fff; margin: 5px; }
        input, button { padding: 12px; margin: 5px; border-radius: 25px; }
        input { width: 70%; background: #1a1a2a; border: 1px solid #ff00ff; color: #fff; }
        button { background: #ff00ff; border: none; color: #000; font-weight: bold; }
        .login-box { max-width: 300px; margin: 50px auto; }
        input { width: 90%; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔥 BLAZE MESSENGER</h1>
    <div id="login" class="login-box">
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
    </div>
    <div id="chat" style="display:none">
        <div id="messages"></div>
        <input type="text" id="message" placeholder="Сообщение">
        <button onclick="sendMessage()">→</button>
    </div>
    <script>
        const SERVER = "https://kael-blaze.onrender.com";
        let socket = null, currentUser = null;

        async function register() {
            const res = await fetch(SERVER + "/api/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: username.value, password: password.value})
            });
            const data = await res.json();
            alert(data.success ? "Регистрация успешна!" : data.error);
        }

        async function login() {
            const res = await fetch(SERVER + "/api/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username: username.value, password: password.value})
            });
            const data = await res.json();
            if (data.success) {
                currentUser = username.value;
                document.getElementById("login").style.display = "none";
                document.getElementById("chat").style.display = "block";
                connectSocket();
            } else {
                alert(data.error);
            }
        }

        function connectSocket() {
            socket = io(SERVER);
            socket.emit("join", {username: currentUser});
            socket.on("new_message", (msg) => {
                const div = document.createElement("div");
                div.className = msg.from === currentUser ? "msg-own" : "msg-other";
                div.innerHTML = `<b>${msg.from}</b>: ${msg.text}`;
                document.getElementById("messages").appendChild(div);
                div.scrollIntoView();
            });
        }

        function sendMessage() {
            const text = document.getElementById("message").value;
            if (!text) return;
            socket.emit("private_message", {from: currentUser, to: "all", text: text});
            document.getElementById("message").value = "";
        }
    </script>
</body>
</html>
